<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>레드향 주문하기</title>
</head>
<body>
  <h1>레드향 주문하기</h1>
  <form>
    <fieldset>
      <legend>주문자 정보</legend>
       <label>주문자 아이디<input type="text" size="10" maxlength="10" /></label> <br/>
    </fieldset>
<fieldset>

      <legend>상품 선택</legend>
      <!-- Do it! 라디오 버튼과 체크 박스를 사용한 폼 만들기 --> 
 <p><b>주문할 상품을 선택해 주세요</b></p>
 <ul>
  <li>
    <input type="checkbox"  id="p3" /> <label for="p3"></label> 선물용 3kg<input type="number" min="1" max="5" value="1"/>(개)(최대5개) </label></li>
  <li>
    <input type="checkbox" id="p5" /> <label for="p5"></label> 선물용 5kg <input type="number" min="1" max="3" value="1"/>(개)(최대3개) </label></li>
  <li>
    <input type="checkbox" id="f3"/> <label for="f3"></label> 가정용 3kg <input type="number" min="1" max="5" value="1"/>(개)(최대5개)</label></li>
  <li>
    <input type="checkbox" id="f5" /> <label for="f5"></label> 가물용 5kg <input type="number" min="1" max="3" value="1"/>(개)(최대3개)</label></li>

 </ul>
 <p><b>포장상태</b></p>
 <ul> 
   <li><input type="radio" name="gift" />선물포장</li>  
   <li><input type="radio" name="gift" />포장안함</li>
 </ul>
    </fieldset>
    <fieldset>
      <legend>배송 정보</legend>
      <ul>
        <li>
          <label for="user-name">이름 </label>
          <input type="text" id="user-name">
        </li>
        <li>
          <label for="addr">배송 주소</label>
          <input type="text" id="addr">
        </li>
        <li> 
          <label for="mail">메일 주소</label>  
          <input type="email" id="mail">
        </li>        
        <li>
          <label for="phone">연락처</label>   
                <input type="tel" id="phone">
        </li>
      </ul>  
    </fieldset>      
  </form>
</body>
</html>
